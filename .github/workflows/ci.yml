name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -q --timeout=30
      - name: Compile key modules
        run: python -m py_compile guardian/server.py guardian/dispatch.py guardian/security.py guardian/handlers/run_bash.py guardian/exec_io.py guardian/roots.py
