# 追加到项目根目录的 pytest.ini 或 pyproject.toml [tool.pytest.ini_options]
# 如果已有 pytest.ini，把 [pytest] 下的配置合并进去

[pytest]
asyncio_mode = auto
timeout = 30
markers =
    stress: 压力测试，可能耗时较长
    benchmark: 性能基准，不作 pass/fail 判断
# 过滤 pytest-asyncio 的 DeprecationWarning
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio
    ignore::pytest.PytestUnraisableExceptionWarning
